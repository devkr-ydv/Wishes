<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Study Well  </title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: rgb(214, 199, 199);
            text-align: center;
        }

        .card {
            background: rgba(0, 0, 0, 0.4);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            max-width: 600px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 16px;
            color: white;
            background-color: #f6c23e;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s ease;
        }

        .btn:hover {
            background-color: #e0a800;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>✨ Best Wishes for Placement Preparation! ✨</h1>
        <p>
            Dear Students,<br><br>
            Your hard work, dedication, and consistency will lead you to success. 
            Keep learning, keep practicing, and believe in yourself. 
            The right opportunity is waiting for you!
        </p>
        <a href="#" class="btn">Keep Preparing 💪</a>
    </div>

</body>
</html>
